# Secret applicatif Ginflix : valeurs fournies par le cours / ton groupe (Keycloak, URI Mongo).
# Remplir avant apply ; ne pas committer de vrais secrets sur un dépôt public.
apiVersion: v1
kind: Secret
metadata:
  name: ginflix-app-secrets
  namespace: ginflix
type: Opaque
stringData:
  KEYCLOAK_CLIENT_ID: "REPLACE_ME"
  KEYCLOAK_REALM: "REPLACE_ME"
  KEYCLOAK_HOST: "REPLACE_ME"
  MONGO_URI: "REPLACE_ME"
