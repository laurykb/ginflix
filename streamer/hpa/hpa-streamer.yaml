apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: streamer-hpa
  namespace: ginflix
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: streamer
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
