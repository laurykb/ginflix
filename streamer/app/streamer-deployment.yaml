apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamer
  namespace: ginflix
  labels:
    app: streamer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streamer
  template:
    metadata:
      labels:
        app: streamer
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: regcred
      containers:
        - name: streamer
          image: registry.gin-telecom.ovh/ginflix/streamer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ginflix-config
            - secretRef:
                name: ginflix-app-secrets
            - secretRef:
                name: ginflix-garage-credentials
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
