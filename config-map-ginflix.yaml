# URLs publiques vues par le navigateur (même host que l’Ingress). Le préfixe ginflix10 = notre instance de groupe sur la VM TP.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ginflix-config
  namespace: ginflix
data:
  BACKEND_URL: "https://ginflix10.gin-telecom.ovh"
  STREAM_URL: "https://ginflix10.gin-telecom.ovh"

  GARAGE_BUCKET: "ginflix10"
  GARAGE_ENDPOINT: "s3.gin-telecom.ovh"