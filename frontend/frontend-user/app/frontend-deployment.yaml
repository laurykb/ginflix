apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ginflix
  labels:
    app: frontend
    security.ginflix.io/hardening: "enabled"
  annotations:
    security.ginflix.io/notes: "Durcissement compatible Nginx (sans drop ALL pour eviter regressions runtime)."
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # Ce frontend n'a pas besoin d'acces API Kubernetes.
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: regcred
      containers:
        - name: frontend
          image: registry.gin-telecom.ovh/ginflix/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: ginflix-config
            - secretRef:
                name: ginflix-app-secrets
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
