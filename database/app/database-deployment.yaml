# MongoDB : service ClusterIP uniquement (pas d’Ingress). Une réplique + PVC suffisent pour le lab ;
# le durcissement agressif est limité ici pour rester compatible avec l’image mongo officielle.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  namespace: ginflix
  labels:
    app: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      automountServiceAccountToken: false
      containers:
        - name: mongo
          image: mongo:6.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-pvc
