kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 443
        hostPort: 8443
        listenAddress: "0.0.0.0"
        protocol: TCP
      - containerPort: 80
        hostPort: 8080
        listenAddress: "0.0.0.0"
        protocol: TCP
  - role: worker
  - role: worker
networking:
  disableDefaultCNI: true        # on laisse la place à Cilium
  kubeProxyMode: "iptables"      # on ne touche pas encore à kube-proxy
