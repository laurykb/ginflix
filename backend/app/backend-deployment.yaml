# API gRPC + HTTP (Ingress /api). 2 replicas pour survivre à la perte d’un nœud Kind.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ginflix
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: regcred
      containers:
        - name: backend
          image: registry.gin-telecom.ovh/ginflix/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ginflix-config
            - secretRef:
                name: ginflix-app-secrets
            - secretRef:
                name: ginflix-garage-credentials
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "300m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "512Mi"
