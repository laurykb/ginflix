apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: ginflix
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 4      # on a déjà 2 réplicas, on garde ça en minimum
  maxReplicas: 15      # on peut monter à 5 si la charge augmente
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 40   # si la moyenne CPU > 60% -> scale out
